<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Speckle and Color Repair</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <aside class="panel">
      <h1>SVG Speckle and Color Repair</h1>
      <p class="hint">Drop an SVG, choose a working color, then brush to erase touched interior speckles/artifacts of any color.</p>

      <section class="group">
        <label for="fileInput">Load SVG</label>
        <input id="fileInput" type="file" accept=".svg,image/svg+xml" />
      </section>

      <section class="group topControls">
        <div class="canvasBlock">
          <label for="canvasBgColor">Canvas Background</label>
          <input id="canvasBgColor" class="color-block" type="color" value="#0a0b0f" aria-label="Canvas color" />
        </div>
      </section>

      <section class="group">
        <label>Working Color</label>
        <div class="row stack">
          <div class="colorControl">
            <input id="replaceColor" class="color-block" type="color" value="#111111" aria-label="Working color" />
            <div id="targetPalette" class="palette"></div>
          </div>
          <label class="checkRow">
            <input id="deleteAllMatching" type="checkbox" />
            <span>Flood Delete</span>
          </label>
          <div class="cmykTool">
            <label class="subLabel">CMYK Adjuster</label>
            <div class="cmykGrid">
              <label for="cmykC" class="subLabel">C</label>
              <input id="cmykC" type="range" min="0" max="100" value="0" step="1" />
              <label for="cmykM" class="subLabel">M</label>
              <input id="cmykM" type="range" min="0" max="100" value="0" step="1" />
              <label for="cmykY" class="subLabel">Y</label>
              <input id="cmykY" type="range" min="0" max="100" value="0" step="1" />
              <label for="cmykK" class="subLabel">K</label>
              <input id="cmykK" type="range" min="0" max="100" value="0" step="1" />
            </div>
            <div class="cmykPreviewRow">
              <div class="previewPair currentPreviewContainer">
                <span class="subLabel">Current</span>
                <div id="workingColorPreview" aria-hidden="true"></div>
              </div>
              <div class="previewPair">
                <span class="subLabel">Adjusted</span>
                <div id="cmykPreview" aria-hidden="true"></div>
              </div>

            </div>
            <button id="applyCmykBtn" type="button">Apply CMYK to Working Color</button>
          </div>
        </div>
      </section>

      <section class="group">
        <button id="deleteCurrentColorBtn">Delete all Current Color</button>
      </section>

      <section id="cleanupOptionsGroup" class="group">
        <label class="sectionHeader">Cleanup options</label>
      </section>

      <section id="speckleAreaGroup" class="group">
        <label for="speckleArea">Path max size to remove <span id="speckleAreaValue" class="inlineValue">90</span></label>
        <input id="speckleArea" type="range" min="10" max="500" value="90" step="1" />
      </section>

      <section class="group">
        <button id="openPathCleanAllBtn">Remove all open paths</button>
      </section>

      <section class="group">
        <button id="viewToggleBtn">Stroke View</button>
      </section>

      <section class="group">
        <label>Crop</label>
        <div class="row stack">
          <button id="cropTransformBtn" type="button">Transform Artboard</button>
          <label for="cropRatio" class="subLabel">Aspect ratio</label>
          <select id="cropRatio">
            <option value="current" selected>Current Aspect Ratio</option>
            <option value="custom">Custom</option>
            <option value="1:1">1:1</option>
            <option value="2:3">2:3</option>
            <option value="3:2">3:2</option>
            <option value="4:5">4:5</option>
            <option value="5:4">5:4</option>
          </select>
          <button id="applyCropBtn">Apply Crop</button>
        </div>
      </section>

      <p class="hint">Tip: Ctrl/Cmd + mouse wheel to zoom. Hold Space for temporary pan.</p>
      <p id="status" class="status">Drop or load an SVG to begin.</p>
    </aside>

    <main class="workspace">
      <div id="stageViewport">
        <div id="stageContent">
          <div id="canvasWrap">
            <div id="emptyCanvasMessage">Drop A file Here to load</div>
            <div id="svgStage"></div>
            <div id="cropPreview" aria-hidden="true"></div>
            <div id="rotationPivot" aria-hidden="true"></div>
            <div id="selectionMarquee" aria-hidden="true"></div>
            <div id="artboardTransform" aria-hidden="true">
              <div class="artboard-handle" data-handle="nw"></div>
              <div class="artboard-handle" data-handle="n"></div>
              <div class="artboard-handle" data-handle="ne"></div>
              <div class="artboard-handle" data-handle="e"></div>
              <div class="artboard-handle" data-handle="se"></div>
              <div class="artboard-handle" data-handle="s"></div>
              <div class="artboard-handle" data-handle="sw"></div>
              <div class="artboard-handle" data-handle="w"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="dropOverlay" aria-hidden="true">Drop SVG to import</div>
      <div id="despeckleHud" class="despeckle-hud" aria-hidden="true">
        <label for="speckleAreaQuick">Path max size to remove <span id="speckleAreaQuickValue" class="inlineValue">90</span></label>
        <input id="speckleAreaQuick" type="range" min="10" max="500" value="90" step="1" />
      </div>
      <div class="viewport-controls">
        <button id="modeSelectBtn" class="iconBtn" aria-label="Select" title="Select">
          <img src="assets/selectArrow.svg" alt="" />
        </button>
        <button id="modeBrushBtn" class="iconBtn" aria-label="Despeckle" title="Despeckle">
          <img src="assets/magicWandRepair.svg" alt="" />
        </button>
        <button id="modeOpenPathBtn" class="iconBtn" aria-label="Delete Path" title="Delete Path">
          <img src="assets/deletePath.svg" alt="" />
        </button>
        <button id="modeFloodFillBtn" class="iconBtn" aria-label="Flood Fill" title="Flood Fill">
          <img src="assets/paintFill.svg" alt="" />
        </button>
        <button id="modeColorSwapBtn" class="iconBtn" aria-label="Recolor all matching" title="Recolor all matching">
          <img src="assets/colorSwap.svg" alt="" />
        </button>
        <button id="modePanBtn" class="iconBtn" aria-label="Pan" title="Pan">
          <img src="assets/panHand.svg" alt="" />
        </button>
        <button id="zoomResetBtn">100%</button>
        <button id="zoomOutBtn">-</button>
        <button id="zoomFitBtn">Fit</button>
        <button id="zoomInBtn">+</button>
        <button id="undoBtn" disabled>Undo</button>
      </div>
      <div id="rotationPopup" class="rotation-popup" aria-hidden="true">
        <label for="rotationSlider">Rotate Selection <span id="rotationValue">0&deg;</span></label>
        <input id="rotationSlider" type="range" min="-180" max="180" value="0" step="1" />
        <div class="row">
          <button id="rotationCancelBtn" type="button">Cancel</button>
          <button id="rotationApplyBtn" type="button">Apply</button>
        </div>
      </div>
    </main>

    <button id="downloadBtn" class="floating-download" disabled>Download SVG</button>

    <script src="https://unpkg.com/paper@0.12.17/dist/paper-full.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
